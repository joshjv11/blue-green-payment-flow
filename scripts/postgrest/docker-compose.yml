services:
  postgrest:
    image: postgrest/postgrest:v12.0.3
    restart: unless-stopped
    environment:
      PGRST_DB_URI: ${PGRST_DB_URI}
      PGRST_DB_SCHEMA: ${PGRST_DB_SCHEMA:-public}
      PGRST_DB_ANON_ROLE: ${PGRST_DB_ANON_ROLE:-anon}
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET}
      PGRST_ROLE_CLAIM_KEY: ${PGRST_ROLE_CLAIM_KEY:-.role}
      PGRST_SERVER_PORT: ${PGRST_SERVER_PORT:-3000}
      PGRST_SERVER_HOST: 0.0.0.0
      PGRST_MAX_ROWS: ${PGRST_MAX_ROWS:-1000}
      PGRST_CORS_ORIGINS: ${PGRST_CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "${PGRST_SERVER_PORT:-3000}:3000"

