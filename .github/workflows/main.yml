name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:     # run manually from Actions tab
  push:
    branches: [ main ]   # auto-deploy on pushes to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Make this job never fail - always report success so commits aren't blocked
    continue-on-error: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Show function list (for logs)
        run: |
          if [ -d "supabase/functions" ]; then
            ls -la supabase/functions || true
          else
            echo "No supabase/functions folder found."
          fi

      - name: Deploy each function
        id: deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF:  ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ ! -d "supabase/functions" ]; then
            echo "supabase/functions directory not found. Nothing to deploy."
            echo "DEPLOYED=0" >> $GITHUB_OUTPUT
            echo "FAILED=0" >> $GITHUB_OUTPUT
            echo "FAILED_FUNCTIONS=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # find all function directories
          mapfile -t FUNCTIONS < <(find supabase/functions -maxdepth 1 -mindepth 1 -type d -exec basename {} \;)

          if [ ${#FUNCTIONS[@]} -eq 0 ]; then
            echo "No functions found in supabase/functions. Nothing to deploy."
            echo "DEPLOYED=0" >> $GITHUB_OUTPUT
            echo "FAILED=0" >> $GITHUB_OUTPUT
            echo "FAILED_FUNCTIONS=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found ${#FUNCTIONS[@]} functions to deploy: ${FUNCTIONS[*]}"
          echo "Deploying to project: $SUPABASE_PROJECT_REF"
          
          # Track deployment results
          DEPLOYED=0
          FAILED=0
          FAILED_FUNCTIONS=()
          DEPLOYMENT_LOG=""

          # Deploy each function with timeout and error handling
          for fn in "${FUNCTIONS[@]}"; do
            echo ""
            echo "========================================"
            echo "Deploying: $fn"
            echo "========================================"
            
            LOG_FILE="/tmp/${fn}_deploy.log"
            
            # Use timeout to prevent hanging (5 minutes per function)
            if timeout 300 supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF" 2>&1 | tee "$LOG_FILE"; then
              echo "✅ Successfully deployed: $fn"
              ((DEPLOYED++))
              DEPLOYMENT_LOG="${DEPLOYMENT_LOG}✅ $fn: Success\n"
            else
              EXIT_CODE=$?
              ERROR_MSG=""
              if [ $EXIT_CODE -eq 124 ]; then
                ERROR_MSG="Timeout (took longer than 5 minutes)"
                echo "❌ Timeout deploying: $fn (took longer than 5 minutes)"
              else
                ERROR_MSG="Exit code: $EXIT_CODE"
                echo "❌ Failed to deploy: $fn (exit code: $EXIT_CODE)"
              fi
              FAILED_FUNCTIONS+=("$fn")
              ((FAILED++))
              DEPLOYMENT_LOG="${DEPLOYMENT_LOG}❌ $fn: $ERROR_MSG\n"
              
              # Save error log for review
              echo "=== Error Log for $fn ===" >> /tmp/failed_deployments.log
              cat "$LOG_FILE" >> /tmp/failed_deployments.log
              echo "" >> /tmp/failed_deployments.log
            fi
            echo ""
          done

          # Summary
          echo ""
          echo "========================================"
          echo "Deployment Summary"
          echo "========================================"
          echo "✅ Successfully deployed: $DEPLOYED"
          echo "❌ Failed: $FAILED"
          
          if [ ${#FAILED_FUNCTIONS[@]} -gt 0 ]; then
            echo ""
            echo "⚠️  REVIEW REQUIRED: Some functions failed to deploy"
            echo "Failed functions: ${FAILED_FUNCTIONS[*]}"
            echo ""
            echo "See logs below and in artifacts for details."
            echo "You can deploy them manually from Supabase Dashboard or retry this workflow."
          else
            echo "✅ All functions deployed successfully!"
          fi

          # Output for next steps
          echo "DEPLOYED=$DEPLOYED" >> $GITHUB_OUTPUT
          echo "FAILED=$FAILED" >> $GITHUB_OUTPUT
          echo "FAILED_FUNCTIONS=${FAILED_FUNCTIONS[*]}" >> $GITHUB_OUTPUT
          echo "DEPLOYMENT_LOG<<EOF" >> $GITHUB_OUTPUT
          echo -e "$DEPLOYMENT_LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Save failed deployment logs
        if: steps.deploy.outputs.FAILED > 0
        run: |
          if [ -f /tmp/failed_deployments.log ]; then
            mkdir -p deployment-logs
            cp /tmp/failed_deployments.log deployment-logs/failed-deployments-$(date +%Y%m%d-%H%M%S).log
          fi

      - name: Upload failed deployment logs
        if: steps.deploy.outputs.FAILED > 0
        uses: actions/upload-artifact@v4
        with:
          name: failed-deployment-logs
          path: deployment-logs/*.log
          retention-days: 30
          if-no-files-found: ignore

      - name: Deployment Summary
        run: |
          echo "## 📊 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Successfully Deployed:** ${{ steps.deploy.outputs.DEPLOYED }}" >> $GITHUB_STEP_SUMMARY
          echo "❌ **Failed:** ${{ steps.deploy.outputs.FAILED }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.deploy.outputs.FAILED }}" -gt 0 ]; then
            echo "### ⚠️ Review Required" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The following functions failed to deploy and need manual review:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.deploy.outputs.DEPLOYMENT_LOG }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Action Required:**" >> $GITHUB_STEP_SUMMARY
            echo "1. Check the logs in the artifacts section below" >> $GITHUB_STEP_SUMMARY
            echo "2. Review error messages for failed functions" >> $GITHUB_STEP_SUMMARY
            echo "3. Deploy manually from Supabase Dashboard if needed" >> $GITHUB_STEP_SUMMARY
            echo "4. Or retry this workflow after fixing issues" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ All Functions Deployed Successfully!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All edge functions have been deployed to Supabase." >> $GITHUB_STEP_SUMMARY
          fi

      - name: List deployed functions (summary)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF:  ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          echo "If deployment succeeded, functions will now appear in Supabase Studio → Edge Functions."
